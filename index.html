<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <title>Audi</title>
</head>
<body>
    <header class="header">
        <a href="#" class="logo">AUDI</a>
        <nav class="navbar">
            <a href="#" style="--i:1" class="active">Home</a>
            <a href="#" style="--i:2">Sobre</a>
            <a href="#" style="--i:3">Análise</a>
        </nav>
        <div class="menu-icon" id="menu-icon">
            <i class='bx bx-menu'></i>
        </div>
        <div class="social-media">
            <a href="#" style="--i:1"><i class='bx bxl-whatsapp'></i></a>
            <a href="#" style="--i:2"><i class='bx bxl-facebook'></i></a>
            <a href="#" style="--i:3"><i class='bx bxl-instagram'></i></a>
        </div>
    </header>

    <section class="home">
        <div class="home-content">
            <h1>A geometria da aceleração</h1>
            <h3>Esportividade</h3>
            <p>No espírito de um gran turismo, a suspensão a ar adaptativa de alta tecnologia oferece conforto, esportividade e usabilidade para o dia a dia.</p>
            <a href="#" class="btn">Design</a>
        </div>
        <div class="home-img">
            <div class="rhombus">
                <img src="img/Teste-img.png" alt="carro">
            </div>
        </div>
        <div class="rhombus2"></div>
    </section>

    <script src="java.js"></script>
</body>
</html>
